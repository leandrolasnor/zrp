global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: '/metrics'

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/metrics'
    basic_auth:
      username: guest
      password: guest

  - job_name: 'postgresql'
    static_configs:
      - targets: ['db-exporter:9187']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'rails_api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'

  - job_name: 'meilisearch'
    static_configs:
      - targets: ['meilisearch:7700']
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials: JoC43qBdG5uVH0LdYXs1rNlg7GCuli-qwQv7kgh-fb0
    scrape_interval: 30s
